[project]
name = "hit"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [

]

[project.optional-dependencies]
cpu = [
    "torch==2.10.0",
    "torchao==0.16.0",
    "torchaudio==2.10.0",
    "torchvision==0.25.0",
]

cu128 = [
    "torch==2.10.0",
    "torchao==0.16.0",
    "torchaudio==2.10.0",
    "torchvision==0.25.0",
]

cu130 = [
    "openrlhf[liger,ring,vllm]>=0.10.3",
    "torch==2.10.0",
    "torchao==0.16.0",
    "torchaudio==2.10.0",
    "torchvision==0.25.0",
    "vllm>=0.19.1",
]

[[tool.uv.index]]
url = "https://flashinfer.ai/whl/cu130"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]
torchvision = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]
torchaudio = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]
torchao = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[tool.uv]
exclude-dependencies = ['pynvml']
conflicts = [
    [
        { extra = "cpu" },
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.extra-build-dependencies]
flash-attn = ["torch"]
